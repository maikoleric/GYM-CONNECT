<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nastavitve – GYM-CONNECT</title>

  <style>
    :root{
      --ink:#1e2a32; --muted:rgba(30,42,50,.68);
      --glass:rgba(255,255,255,.30); --glass2:rgba(255,255,255,.18); --stroke:rgba(255,255,255,.45);
      --accent1:#4fd1c5; --accent2:#63b3ed; --accent3:#81e6d9;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(900px 600px at 15% 15%, rgba(99,179,237,.55), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, rgba(79,209,197,.55), transparent 60%),
        radial-gradient(900px 700px at 50% 85%, rgba(129,230,217,.55), transparent 65%),
        linear-gradient(180deg, #f2f8ff, #eefbf8 55%, #e6f7ff);
    }

    .card{
      position:relative;
      width:min(720px,92vw);
      padding:44px 48px;
      border-radius:28px;
      background:linear-gradient(180deg,var(--glass),var(--glass2));
      border:1px solid var(--stroke);
      box-shadow:0 24px 70px rgba(20,30,60,.18);
      backdrop-filter:blur(18px);
      text-align:center;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:30px;
      background:linear-gradient(120deg,rgba(255,182,199,.35),rgba(166,184,255,.25),rgba(138,209,194,.25));
      filter:blur(18px);
      opacity:.35;
      z-index:-1;
    }

    h1{margin:0 0 10px 0;}
    .subtitle{color:var(--muted); margin-bottom:20px;}

    label{
      display:block;
      text-align:left;
      margin-top:12px;
      font-weight:700;
      font-size:13px;
    }

    input{
      width:100%;
      padding:10px 12px;
      margin-top:6px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.55);
      background:rgba(255,255,255,.22);
      font-family:inherit;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .btn{
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.45);
      background:rgba(255,255,255,.18);
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg, rgba(138,209,194,.35), rgba(255,255,255,.18));
    }

    .btn:hover{background:rgba(255,255,255,.28);}
  </style>
</head>

<body>
  <main class="card">
    <h1>Nastavitve</h1>
    <p class="subtitle">Uredi svoj profil.</p>

    <form method="POST" action="{{ url_for('settings') }}">

      <label>Kontakt</label>
      <input type="text" name="contact" value="{{ user.contact }}" required>

      <label>Ime fitnesa</label>
      <input type="text" name="gym_name" value="{{ user.gym_name }}" required>

      <label>Lokacija</label>
      <input type="text" name="location" value="{{ user.location }}" required>

      <div class="buttons">
        <button class="btn primary" type="submit">Shrani spremembe</button>
        <a class="btn" href="{{ url_for('dashboard') }}">Nazaj</a>
      </div>
    </form>
  </main>
</body>
</html>
